<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#1a2744" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Score Ring -->
  <g transform="translate(200, 315)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1a2744" stroke-width="12"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#accent)" stroke-width="12"
            stroke-dasharray="628" stroke-dashoffset="63" stroke-linecap="round"
            transform="rotate(-90)" filter="url(#glow)"/>
    <text x="0" y="15" text-anchor="middle" fill="#00d4ff" font-family="Inter, sans-serif" font-size="64" font-weight="800" filter="url(#glow)">90</text>
    <text x="0" y="45" text-anchor="middle" fill="#94a3b8" font-family="Inter, sans-serif" font-size="20">/100</text>
  </g>
  <!-- Title -->
  <text x="380" y="240" fill="white" font-family="Inter, sans-serif" font-size="56" font-weight="800">
    <tspan fill="url(#accent)">大坝</tspan> IP PureCheck
  </text>
  <!-- Subtitle -->
  <text x="380" y="300" fill="#94a3b8" font-family="Inter, sans-serif" font-size="24">
    IP 纯净度检测平台 — 全面检测 IP 质量、纯净度与安全隐私风险
  </text>
  <!-- Features -->
  <g fill="#e2e8f0" font-family="Inter, sans-serif" font-size="18">
    <text x="380" y="370">🛡️ IP 纯净度评分 &amp; 类型分类</text>
    <text x="380" y="400">🔍 WebRTC / DNS / IPv6 泄露检测</text>
    <text x="380" y="430">🤖 Claude / ChatGPT / Gemini / Copilot 可达性检测</text>
    <text x="380" y="460">🔑 浏览器指纹一致性分析</text>
  </g>
  <!-- Badge -->
  <rect x="380" y="500" width="200" height="44" rx="22" fill="url(#accent)" opacity="0.9"/>
  <text x="480" y="528" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="18" font-weight="600">✦ 免费使用</text>
  <!-- URL -->
  <text x="380" y="580" fill="#64748b" font-family="JetBrains Mono, monospace" font-size="16">Daba IP PureCheck — Powered by Cloudflare</text>
</svg>
